  <script>
    const items = JSON.parse(document.getElementById('lesson-data').textContent);
    const cards = document.getElementById('cards');
    const index = document.getElementById('index');
    const search = document.getElementById('search');
    const rate = document.getElementById('rate');
    let queue = [];
    let activeCard = null;

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function render() {
      cards.innerHTML = '';
      index.innerHTML = '';
      items.forEach((item, itemIndex) => {
        const link = document.createElement('a');
        link.href = '#word-' + itemIndex;
        link.textContent = item.word;
        index.append(link);

        const card = document.createElement('article');
        card.className = 'card';
        card.id = 'word-' + itemIndex;
        card.dataset.search = [item.word, ...item.meanings.flatMap((m) => [m.partOfSpeech, m.pronunciation, m.meaning, m.example])].join(' ').toLowerCase();
        card.innerHTML = `
          <div class="card-head">
            <h2 class="word">${escapeHtml(item.word)}<small>heteronym / 多音字</small></h2>
            <button class="secondary speak-word" type="button" data-text="${escapeHtml(item.word.split('/')[0].trim())}">🔊 單字</button>
          </div>
          <div class="meaning-grid">
            ${item.meanings.map((meaning) => `
              <div class="meaning">
                <div class="meaning-top">
                  <div class="label-row"><span class="tag">${escapeHtml(meaning.label)}</span><span class="pos">${escapeHtml(meaning.partOfSpeech)}</span></div>
                  <div class="ipa">${escapeHtml(meaning.pronunciation)}</div>
                  <div class="zh">${escapeHtml(meaning.meaning)}</div>
                </div>
                <div class="example-row">
                  <p class="example">${highlightWord(meaning.example, item.word)}</p>
                  <button class="speak-example" type="button" data-text="${escapeHtml(meaning.example)}">▶ 朗讀例句</button>
                </div>
              </div>
            `).join('')}
          </div>`;
        cards.append(card);
      });
    }

    function highlightWord(sentence, word) {
      const primary = word.split('/')[0].trim();
      const escaped = primary.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pattern = new RegExp('\\b(' + escaped + ')\\b', 'gi');
      return escapeHtml(sentence).replace(pattern, '<strong>$1</strong>');
    }

    function getVoice() {
      const voices = speechSynthesis.getVoices();
      return voices.find((voice) => voice.lang === 'en-US') || voices.find((voice) => voice.lang.startsWith('en')) || voices[0];
    }

    function speak(text, card) {
      speechSynthesis.cancel();
      clearActive();
      activeCard = card || null;
      if (activeCard) {
        activeCard.classList.add('is-playing');
        activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = Number(rate.value);
      const voice = getVoice();
      if (voice) utterance.voice = voice;
      utterance.onend = () => clearActive();
      speechSynthesis.speak(utterance);
    }

    function clearActive() {
      if (activeCard) activeCard.classList.remove('is-playing');
      activeCard = null;
    }

    function speakNext() {
      if (!queue.length) { clearActive(); return; }
      const next = queue.shift();
      speechSynthesis.cancel();
      clearActive();
      activeCard = next.card;
      activeCard.classList.add('is-playing');
      activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const utterance = new SpeechSynthesisUtterance(next.text);
      utterance.lang = 'en-US';
      utterance.rate = Number(rate.value);
      const voice = getVoice();
      if (voice) utterance.voice = voice;
      utterance.onend = speakNext;
      utterance.onerror = () => clearActive();
      speechSynthesis.speak(utterance);
    }

    document.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-text]');
      if (!button) return;
      speak(button.dataset.text, button.closest('.card'));
    });

    document.getElementById('readAll').addEventListener('click', () => {
      queue = Array.from(document.querySelectorAll('.card:not(.hidden)')).flatMap((card) =>
        Array.from(card.querySelectorAll('.speak-example')).map((button) => ({ text: button.dataset.text, card }))
      );
      speakNext();
    });

    document.getElementById('stop').addEventListener('click', () => {
      queue = [];
      speechSynthesis.cancel();
      clearActive();
    });

    search.addEventListener('input', () => {
      const keyword = search.value.trim().toLowerCase();
      document.querySelectorAll('.card').forEach((card) => {
        card.classList.toggle('hidden', keyword && !card.dataset.search.includes(keyword));
      });
    });

    speechSynthesis.onvoiceschanged = getVoice;
    render();
  </script>
</body>
</html>
